<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }
    h1 {
      margin-top: 20px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 2em;
      background: white;
      border: 2px solid #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell:hover {
      background: #ddd;
    }
    #status {
      margin-top: 20px;
      font-size: 1.2em;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1em;
    }
    <title>G4Y p0RN BDSM ULTIMATE </title>
  </style>
</head>
<body>

<h1>Tic Tac Toe (AI)</h1>
<div id="board"></div>
<div id="status"></div>
<button onclick="resetGame()">Restart</button>

<script>
  const boardElement = document.getElementById("board");
  const statusElement = document.getElementById("status");

  let board = ["", "", "", "", "", "", "", "", ""];
  let human = "X";
  let ai = "O";
  let gameOver = false;

  function createBoard() {
    boardElement.innerHTML = "";
    board.forEach((cell, index) => {
      const div = document.createElement("div");
      div.classList.add("cell");
      div.innerText = cell;
      div.addEventListener("click", () => playerMove(index));
      boardElement.appendChild(div);
    });
  }

  function playerMove(index) {
    if (board[index] !== "" || gameOver) return;

    board[index] = human;
    update();

    if (!gameOver) {
      setTimeout(aiMove, 300);
    }
  }

  function aiMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = ai;
        let score = minimax(board, 0, false);
        board[i] = "";
        if (score > bestScore) {
          bestScore = score;
          move = i;
        }
      }
    }

    board[move] = ai;
    update();
  }

  function minimax(board, depth, isMaximizing) {
    let result = checkWinner();
    if (result !== null) {
      const scores = {
        X: -1,
        O: 1,
        tie: 0
      };
      return scores[result];
    }

    if (isMaximizing) {
      let bestScore = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (board[i] === "") {
          board[i] = ai;
          let score = minimax(board, depth + 1, false);
          board[i] = "";
          bestScore = Math.max(score, bestScore);
        }
      }
      return bestScore;
    } else {
      let bestScore = Infinity;
      for (let i = 0; i < 9; i++) {
        if (board[i] === "") {
          board[i] = human;
          let score = minimax(board, depth + 1, true);
          board[i] = "";
          bestScore = Math.min(score, bestScore);
        }
      }
      return bestScore;
    }
  }

  function checkWinner() {
    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    for (let combo of wins) {
      let [a,b,c] = combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return board[a];
      }
    }

    if (!board.includes("")) return "tie";
    return null;
  }

  function update() {
    createBoard();
    let winner = checkWinner();

    if (winner) {
      gameOver = true;
      if (winner === "tie") {
        statusElement.innerText = "It's a tie!";
      } else {
        statusElement.innerText = winner + " wins!";
      }
    }
  }

  function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    gameOver = false;
    statusElement.innerText = "";
    createBoard();
  }

  createBoard();
</script>

</body>
</html>
